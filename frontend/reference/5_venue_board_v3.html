<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PTM Venue Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;background:#FFF8F3;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
.screen{height:100svh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#F47920;padding:clamp(10px,1.5vw,18px) clamp(16px,2.5vw,32px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:clamp(16px,2.2vw,26px);font-weight:700;color:#fff;letter-spacing:-.03em}
.topbar-sub{font-size:clamp(10px,1.2vw,13px);color:rgba(255,255,255,.8);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:clamp(8px,1.2vw,16px);flex-shrink:0}
.topbar-logo{height:clamp(22px,2.8vw,36px);width:auto;filter:brightness(0) invert(1);opacity:.9}
.clock{font-size:clamp(16px,2.2vw,26px);font-weight:700;background:#fff;color:#F47920;padding:clamp(4px,.7vw,9px) clamp(10px,1.5vw,18px);border-radius:8px;white-space:nowrap}
.progress-wrap{height:4px;background:#F4C099;flex-shrink:0}
.progress-bar{height:100%;background:#F47920;transition:width .1s linear}
.controls{padding:clamp(8px,1.2vw,14px) clamp(16px,2.5vw,32px);background:#FFF8F3;border-bottom:1px solid #F4C099;display:flex;align-items:center;gap:clamp(8px,1.2vw,14px);flex-shrink:0;flex-wrap:wrap}
.ctrl-btn{font-size:clamp(11px,1.4vw,15px);font-weight:600;padding:clamp(5px,.8vw,9px) clamp(12px,1.6vw,18px);border-radius:50px;cursor:pointer;border:1.5px solid #F4C099;background:#fff;color:#9CA3AF;transition:all .15s;white-space:nowrap}
.ctrl-btn:hover{border-color:#F47920;color:#F47920}
.ctrl-btn.active{background:#FFF0E6;border-color:#F47920;color:#C45A0A}
.ctrl-label{font-size:clamp(11px,1.3vw,14px);color:#9CA3AF;font-weight:500}
.speed-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.venue-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(110px,13vw,200px),1fr));gap:clamp(4px,.7vw,10px);padding:clamp(6px,1vw,14px) clamp(8px,1.2vw,20px);overflow:hidden;align-content:start}
.venue-card{border-radius:10px;padding:clamp(6px,.8vw,12px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:clamp(2px,.3vw,5px);border:1.5px solid transparent}
.venue-card.in-session{background:#FDDFC8;border-color:#F4B896}
.venue-card.free{background:#fff;border-color:#E5E7EB}
.venue-card.on-break{background:#FFF8F3;border-color:#F4C099}
.venue-card.blocked{background:#F9FAFB;border-color:#E5E7EB;opacity:.5}
.card-room{font-size:clamp(7px,.8vw,11px);font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.7)}
.free .card-room,.on-break .card-room,.blocked .card-room{color:#9CA3AF}.in-session .card-room{color:#C45A0A}.in-session .card-teacher{color:#1B3F7A}.in-session .card-subject{color:#C45A0A}
.card-teacher{font-size:clamp(10px,1.2vw,16px);font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;width:100%;text-align:center}
.free .card-teacher,.blocked .card-teacher{color:#1B3F7A}
.on-break .card-teacher{color:#F47920}
.card-subject{font-size:clamp(8px,1vw,12px);color:rgba(255,255,255,.7)}
.free .card-subject,.blocked .card-subject{color:#9CA3AF}
.on-break .card-subject{color:#F47920;opacity:.7}
.card-status{font-size:clamp(7px,.9vw,11px);font-weight:700;padding:clamp(2px,.3vw,4px) clamp(6px,.9vw,10px);border-radius:20px;margin-top:1px}
.in-session .card-status{background:#F47920;color:#fff}
.free .card-status{background:#ECFDF5;color:#059669}
.on-break .card-status{background:#FFF0E6;color:#C45A0A;border:1px solid #F4C099}
.blocked .card-status{background:#F3F4F6;color:#9CA3AF}
.summary-bar{padding:clamp(4px,.7vw,10px) clamp(10px,1.8vw,32px);background:#FFF8F3;border-top:1px solid #F4C099;display:flex;gap:clamp(8px,1.5vw,32px);flex-wrap:wrap;flex-shrink:0;align-items:center}
.sum-item{font-size:clamp(9px,1vw,14px);font-weight:600;display:flex;align-items:center;gap:5px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style></head><body>

var currentPage=0,paused=false,speed=10000,timer=null,startTime=null;

function calcPerPage(){
  var grid=document.getElementById('venue-grid');
  var gridH=grid.clientHeight;
  var gridW=grid.clientWidth;
  if(!gridH||!gridW)return 24;
  // read computed column count from the actual rendered grid
  var colWidth=parseFloat(getComputedStyle(grid).getPropertyValue('grid-template-columns').split(' ')[0]);
  var gap=parseFloat(getComputedStyle(grid).gap)||6;
  var cols=Math.max(1,Math.round(gridW/(colWidth+gap)));
  // estimate row height from a rendered card, or fall back to a clamp
  var cards=grid.querySelectorAll('.venue-card');
  var cardH=cards.length>0?cards[0].getBoundingClientRect().height:80;
  var rows=Math.max(1,Math.floor(gridH/(cardH+gap)));
  return cols*rows;
}

function totalPages(){return Math.ceil(venues.length/calcPerPage());}

function renderPage(){
  var grid=document.getElementById('venue-grid');
  grid.innerHTML='';
  var perPage=calcPerPage();
  var start=currentPage*perPage;
  var pv=venues.slice(start,start+perPage);
  var sl={'in-session':'In session','free':'Free','on-break':'On break','blocked':'Blocked'};
  for(var i=0;i<pv.length;i++){
    var v=pv[i];
    var card=document.createElement('div');
    card.className='venue-card '+v.status;
    card.innerHTML='<div class="card-room">'+v.room+'</div>'+
      '<div class="card-teacher">'+v.teacher+'</div>'+
      '<div class="card-subject">'+v.subject+'</div>'+
      '<div class="card-status">'+sl[v.status]+'</div>';
    grid.appendChild(card);
  }
  document.getElementById('page-label').textContent='Page '+(currentPage+1)+' of '+totalPages();
  updateSummary();
}

function updateSummary(){
  var s=0,f=0,b=0,bl=0;
  for(var i=0;i<venues.length;i++){
    var st=venues[i].status;
    if(st==='in-session')s++;
    else if(st==='free')f++;
    else if(st==='on-break')b++;
    else bl++;
  }
  document.getElementById('sum-session').textContent=s;
  document.getElementById('sum-free').textContent=f;
  document.getElementById('sum-break').textContent=b;
  document.getElementById('sum-blocked').textContent=bl;
}

function startProgress(){
  if(paused)return;
  startTime=Date.now();
  document.getElementById('progress-bar').style.width='0%';
  clearInterval(timer);
  timer=setInterval(function(){
    var elapsed=Date.now()-startTime;
    var pct=Math.min(elapsed/speed*100,100);
    document.getElementById('progress-bar').style.width=pct+'%';
    if(elapsed>=speed)nextPage();
  },50);
}

function nextPage(){currentPage=(currentPage+1)%totalPages();renderPage();startProgress();}
function prevPage(){currentPage=(currentPage-1+totalPages())%totalPages();renderPage();if(!paused)startProgress();}

function togglePause(){
  paused=!paused;
  var btn=document.getElementById('btn-pause');
  btn.textContent=paused?'Resume':'Pause';
  btn.className='ctrl-btn'+(paused?' active':'');
  if(paused){clearInterval(timer);document.getElementById('progress-bar').style.width='0%';}
  else startProgress();
}

function setSpeed(s){
  speed=s;
  var opts=[5000,10000,20000];
  for(var i=0;i<opts.length;i++){
    document.getElementById('speed-'+opts[i]).className='ctrl-btn'+(s===opts[i]?' active':'');
  }
  if(!paused)startProgress();
}

function simulateRandom(){
  var statuses=['in-session','in-session','free','free','free','on-break'];
  for(var i=0;i<venues.length;i++){
    venues[i].status=statuses[Math.floor(Math.random()*statuses.length)];
  }
  renderPage();
}

function updateClock(){
  var now=new Date();var h=now.getHours(),m=now.getMinutes();
  var ampm=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clock').textContent=h+':'+(m<10?'0':'')+m+' '+ampm;
}

// re-render on resize/orientation change
var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){
    currentPage=0;
    renderPage();
    if(!paused)startProgress();
  },120);
});

setInterval(updateClock,1000);updateClock();
// wait one frame so grid has painted before we measure it
requestAnimationFrame(function(){renderPage();startProgress();});
